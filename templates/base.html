<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}The 80% Bill{% endblock %}</title>
    {% load static %}
    <link rel="icon" type="image/png" href="{% static 'logo.png' %}">
    <link rel="stylesheet" href="{% static 'css/theme.css' %}">
</head>
<body>
    <header class="app-bar" aria-label="Main navigation">
        <button type="button" class="app-bar-menu-btn" onclick="document.body.classList.toggle('sidebar-open')" aria-label="Toggle menu">
            <span class="app-bar-menu-icon">≡</span>
        </button>
    </header>
    <div class="sidebar-backdrop" onclick="document.body.classList.remove('sidebar-open')" aria-hidden="true"></div>
    <div class="app-container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-content">
                <a href="/"><img src="{% static 'logo.png' %}" alt="The 80% Bill" class="sidebar-logo"></a>
                <hr class="sidebar-divider">
                <a href="{% url 'reps:directory' %}" class="sidebar-btn">
                    🏛️ Find Your Representative
                </a>
                <a href="{% url 'data:index' %}" class="sidebar-btn">
                    📊 View anonymized data by district
                </a>
            </div>
        </aside>
        <main class="main-content {% block main_content_class %}{% endblock %}">
            <div class="main-content-inner">
                {% if messages %}
                    <div class="messages">
                        {% for message in messages %}
                            <div class="alert alert-{{ message.tags }}">{{ message }}</div>
                        {% endfor %}
                    </div>
                {% endif %}
                {% block content %}{% endblock %}
            </div>
        </main>
    </div>
</body>
</html>
