<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Text Email</title>
</head>
<body style="margin: 0; padding: 0; font-family: Arial, sans-serif; background-color: #f4f4f4;">
    <table width="100%" cellpadding="0" cellspacing="0" style="background-color: #f4f4f4;">
        <tr>
            <td align="center" style="padding: 40px 0;">
                <table width="600" cellpadding="0" cellspacing="0" style="background-color: #ffffff; border-radius: 8px;">
                    <!-- Body -->
                    <tr>
                        <td style="padding: 40px;">
                            <p style="color: #555555; line-height: 1.6; margin: 0 0 15px 0;">
                                Hi {{first_name}},
                            </p>
                            
                            <p style="color: #555555; line-height: 1.6; margin: 0 0 15px 0;">
                                {{message}}
                            </p>
                            
                            <p style="color: #555555; line-height: 1.6; margin: 20px 0 0 0;">
                                Best regards,<br>
                                The 80% Bill Team
                            </p>
                        </td>
                    </tr>
                    
                    <!-- Footer -->
                    <tr>
                        <td style="background-color: #f8f9fa; padding: 20px 40px; text-align: center; border-top: 1px solid #dee2e6;">
                            <p style="color: #95a5a6; font-size: 11px; margin: 0;">
                                <a href="{{unsubscribe_link}}" style="color: #95a5a6; text-decoration: underline;">Unsubscribe</a>
                            </p>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
